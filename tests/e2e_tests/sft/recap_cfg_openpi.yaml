defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-1

runner:
  task_type: sft
  logger:
    log_path: "/workspace/results/recap_cfg_openpi"
    project_name: rlinf
    experiment_name: "recap_cfg_openpi"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1
  val_check_interval: -1
  save_interval: -1

data:
  num_workers: 1
  # Tag: loads meta/advantages_{tag}.parquet from each dataset
  # If null, loads meta/advantages.parquet (legacy format)
  advantage_tag: fail300_N5_ckpt9000_q30_collect4096_task0

  # Balance sampling weights by dataset length
  balance_dataset_weights: true

  seed: 42

  train_data_paths:
    - dataset_path: "/workspace/dataset/data/sft-ci-data/recap/libero_10_3shot"
      type: "sft"
      weight: 1.0

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 8
  seed: 0

  model:
    precision: null
    model_path: "/workspace/dataset/pi05_base/"
    model_type: "cfg_model"
    add_value_head: False
    openpi:
      config_name: "pi05_libero"
      cfgrl_guidance_scale: 1.0
      unconditional_prob: 0.1
      train_expert_only: False
      guidance_type: "positive"
      positive_only_conditional: true

  optim:
    lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: 0
    total_training_steps: 30000
    min_lr: 0.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
